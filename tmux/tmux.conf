# use control + meta h and l to switch windows
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Enable focus events
set -s focus-events on

# Remove delay after ESC is pressed
set -s escape-time 0

# unbind default prefix and set it to C-a
unbind C-b
set -g prefix C-a
bind a send-prefix

# act like vim
set -g mode-keys vi
set -g status-keys vi

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

setw -g automatic-rename on
set -g renumber-windows on

set -g monitor-activity on
set -g visual-activity off

set -g default-terminal "screen-256color"
if 'infocmp -x tmux-256color > /dev/null 2>&1' 'set -g default-terminal "tmux-256color"'

set -as terminal-features ",xterm*:RGB,ghostty*:RGB"
set -ga terminal-overrides ",*256col*:Tc,ghostty*:Tc"

# Increase scrollback
set -g history-limit 150000

# Show status line messages until key is pressed
set -g display-time 0

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# swap pane
bind C-k swap-pane -U
bind C-j swap-pane -D

# split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# synchronize panes
bind y setw synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Secondary binding for C-l to retain redraw
bind C-l send-keys 'C-l'

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

bind-key -N "Open cheatsheet" -r S run-shell "tmux neww tmux-cht"

# open notes
bind-key -N "Open notes" -r N run-shell "tmux neww open_note"

# open lazygit
bind-key -N "Open Lazygit" -r C-g run-shell "tmux popup -d \"#{pane_current_path}\" -xC -yC -w80% -h80% -E lazygit"

# open file in nvim
bind-key -N "Open file in nvim" -r C-f run-shell "tmux neww 'zsh -i -c open_file'"

# copy file path to clipboard
bind-key -N "Copy file path to clipboard" -r f run-shell "tmux popup -d '#{pane_current_path}' -xC -yC -w80% -h80% -E 'TMUX_TARGET_PANE=#{pane_id} zsh -i -c copy_file_path; true'"

# open a scratch terminal
bind-key -N "Start a scratch terminal session" -r M-g display-popup -E "tmux new-session -A -s scratch"

# reload config file
bind-key -N "Reload the config file" r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# claude-session-manager
bind-key -N "Open claude session manager picker" C-c run-shell "claude-session-manager picker"

# List of plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'pablobfonseca/cyberpunk-theme'
set -ga update-environment EDITOR
# set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'laktak/extrakto'
# set -g @fingers-key f
# set -g @fingers-jump-key j
# set -g @plugin 'pablobfonseca/tmux-vim-cheat'

# open sessionx
set -g @sessionx-bind 'o'
set -g @sessionx-fzf-builtin-tmux 'off' # Temporary, as the built-in tmux is broken
set -g @sessionx-tmuxinator-mode 'on'

# image.nvim
set -gq allow-passthrough on
set -g visual-activity off

# Theme — set options before loading (see cyberpunk_options.conf for defaults)
set -g @cyberpunk_flavor "storm"    # storm | night | neon
set -g @cyberpunk_claude_sessions "yes" # enable claude-session-manager integration

# run '~/code/nvim/cyberpunk-theme/cyberpunk.tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
